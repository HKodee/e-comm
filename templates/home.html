<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Welcome Page</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #8B0000, #ff4d4d);
        }

        .welcome-box{
            background: white;
            padding: 40px;
            width: 400px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        .welcome-box h1{
            color: #8B0000;
            margin-bottom: 15px;
        }

        .welcome-box p{
            color: #555;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .btn{
            display: inline-block;
            padding: 12px 25px;
            background: #8B0000;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover{
            background: #a30000;
        }
    </style>
</head>
<body>

    <div class="welcome-box">
        <h1>Welcome!</h1>

        <p>
            Your account has been created successfully.
        </p>

        <a href="/login" class="btn">Go to Login</a>
    </div>

</body>
</html>
