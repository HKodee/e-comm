<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register Form</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #8B0000, #ff4d4d);
        }

        .container{
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        .container h2{
            text-align: center;
            margin-bottom: 20px;
            color: #8B0000;
        }

        .input-box{
            margin-bottom: 15px;
        }

        .input-box label{
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .input-box input{
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        .input-box input:focus{
            border-color: #8B0000;
        }

        .btn{
            width: 100%;
            padding: 10px;
            border: none;
            background: #8B0000;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover{
            background: #a30000;
        }

        .login-link{
            text-align: center;
            margin-top: 15px;
        }

        .login-link a{
            color: #8B0000;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Register</h2>

        <form>
            <div class="input-box">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="input-box">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" placeholder="Enter password" required>
            </div>

            <div class="input-box">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password" required>
            </div>

            <button type="submit" class="btn">Register</button>

            <div class="login-link">
                Already have an account?
                <a href="/login">Login</a>
            </div>
        </form>
    </div>

</body>
</html>
